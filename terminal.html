function wr(text, color) {
  const span = document.createElement("span");

  if (color) span.style.color = color;
  termOutput.appendChild(span);
  termOutput.appendChild(document.createTextNode("\n"));
  termOutput.scrollTop = termOutput.scrollHeight;
}
function write(text, color) { wr(text, color); }
function blank() { wr(""); }

// ── SIEM LOG QUERIES ──
function formatEvent(ev) {
  const t = (ev.timestamp || "").slice(0,19).replace("T"," ");
  const s = (ev.source  || "---").toUpperCase().padEnd(5);
  const l = (ev.level   || "INFO").padEnd(6);
  const m = ev.message || "";
  const col = l.trim() === "ALERT" ? "#ef4444"
            : l.trim() === "WARN"  ? "#f97316"
            : l.trim() === "OPEN"  ? "#4ade80"
            : "#8a919e";
  write(`  [${t}][${s}][${l}] ${m}`, col);
}

async function fetchLogs() {
  const r = await fetch("data/logs_web.json?" + Date.now());
  const j = await r.json();
  return Array.isArray(j) ? j : [];
}

async function showGlobalLogs() {
  write("Loading logs from data/logs_web.json ...", "#8a919e");
  try {
    const events = await fetchLogs();
    if (!events.length) { write("  No events found.", "#8a919e"); return; }
    write(`══ ${events.length} events ══`, "#facc15");
    events.forEach(formatEvent);
    blank();
    write("  Filters: logs source= / logs level= / logs since= / logs contains=", "#8a919e");
  } catch(e) {
    write("  [ERROR] Could not load logs: " + e.message, "#ef4444");
    write("  Make sure data/logs_web.json exists in the repo.", "#8a919e");
  }
}

async function filterLogsSince(spec) {
  const map = { s:1000, m:60000, h:3600000, d:86400000 };
  const unit = spec.slice(-1), amt = parseInt(spec);
  if (!map[unit] || isNaN(amt)) { write("  Invalid format — use: 10m, 2h, 3d", "#ef4444"); return; }
  const threshold = Date.now() - amt * map[unit];
  const events = await fetchLogs();
  const filtered = events.filter(e => Date.parse(e.timestamp) >= threshold);
  write(`═ Logs from last ${spec}: ${filtered.length} events ═`, "#facc15");
  filtered.length ? filtered.forEach(formatEvent) : write("  No events in that window.", "#8a919e");
}

async function filterByField(field, val) {
  const events = await fetchLogs();
  const filtered = events.filter(e => ((e[field]||"").toLowerCase() === val.toLowerCase()));
  write(`═ ${field}=${val}: ${filtered.length} events ═`, "#facc15");
  filtered.length ? filtered.forEach(formatEvent) : write("  No matching events.", "#8a919e");
}

async function filterContains(kw) {
  const events = await fetchLogs();
  const filtered = events.filter(e => JSON.stringify(e).toLowerCase().includes(kw.toLowerCase()));
  write(`═ contains="${kw}": ${filtered.length} events ═`, "#facc15");
  filtered.length ? filtered.forEach(formatEvent) : write("  No matching events.", "#8a919e");
}

async function exportCSV() {
  const events = await fetchLogs();
  if (!events.length) { write("  No logs to export.", "#8a919e"); return; }
  let csv = "timestamp,source,level,event_type,message\n";
  events.forEach(e => {
    csv += `"${e.timestamp}","${e.source}","${e.level}","${e.event_type}","${(e.message||"").replace(/"/g,'""')}"\n`;
  });
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([csv], {type:"text/csv"})),
    download: "logs_export.csv"
  });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  write("  [OK] logs_export.csv downloaded.", "#4ade80");
}

async function exportJSONL() {
  const events = await fetchLogs();
  if (!events.length) { write("  No logs to export.", "#8a919e"); return; }
  const jsonl = events.map(e => JSON.stringify(e)).join("\n");
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([jsonl], {type:"application/json"})),
    download: "logs_export.jsonl"
  });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  write("  [OK] logs_export.jsonl downloaded.", "#4ade80");
}

let followInterval = null;
let followLen = 0;
async function tailLogs() {
  if (followInterval) { clearInterval(followInterval); followInterval = null; write("  [Tail stopped]", "#8a919e"); return; }
  write("  Following logs every 10s — run 'logs --follow' again to stop.", "#fbbf24");
  followInterval = setInterval(async () => {
    const events = await fetchLogs();
    if (events.length > followLen) {
      events.slice(followLen).forEach(formatEvent);
      followLen = events.length;
    }
  }, 10000);
}

async function runAlerts() {
  write("══ Running Detection Rules ══", "#facc15");
  const events = await fetchLogs();
  if (!events.length) { write("  No events to analyze.", "#8a919e"); return; }
  const alerts = [];
  if (events.filter(e => e.level==="WARN" && e.event_type==="PORT_REFUSED").length >= 3)
    alerts.push("Possible port scanning activity (≥3 refused ports)");
  if (events.filter(e => e.event_type==="DOOR_DENIED").length >= 3)
    alerts.push("Physical access brute force — CyberDoor");
  if (events.filter(e => e.event_type==="WEAK_PASSWORD").length >= 3)
    alerts.push("Repeated weak/common password usage detected");
  if (events.filter(e => e.event_type==="BREACHED_PASSWORD").length >= 1)
    alerts.push("Breached password found in HIBP database");
  blank();
  if (!alerts.length) { write("  [OK] No alerts triggered.", "#4ade80"); }
  else alerts.forEach(a => write("  ⚠ " + a, "#ef4444"));
  blank();
}

// ── COMPOSITE QUERY ──
async function compositeQuery(line) {
  const parts = line.replace(/^logs\s*/,"").split(/\s+/);
  const filters = {};
  parts.forEach(p => { const [k,v] = p.split("="); if (k&&v) filters[k]=v; });
  let events = await fetchLogs();
  if (filters.since) {
    const map={s:1000,m:60000,h:3600000,d:86400000};
    const u=filters.since.slice(-1), a=parseInt(filters.since);
    if (map[u] && !isNaN(a)) { const t=Date.now()-a*map[u]; events=events.filter(e=>Date.parse(e.timestamp)>=t); }
  }
  if (filters.source)   events = events.filter(e=>(e.source||"").toLowerCase()===filters.source.toLowerCase());
  if (filters.level)    events = events.filter(e=>(e.level||"").toLowerCase()===filters.level.toLowerCase());
  if (filters.contains) events = events.filter(e=>JSON.stringify(e).toLowerCase().includes(filters.contains.toLowerCase()));
  write(`═ Query result: ${events.length} events ═`, "#facc15");
  events.length ? events.forEach(formatEvent) : write("  No matching events.", "#8a919e");
}

// ── COMMAND HANDLER ──
async function handleCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;
  write("\ndaniel@portfolio:~$ " + cmd, "#facc15");

  const lo = cmd.toLowerCase();

  if (lo==="help")                              { showHelp(); }
  else if (lo==="about")                        { write("  Daniel Michael — 10th grade, Cristo Rey Atlanta Jesuit"); write("  Georgia Tech Dean of Engineering Work Study"); write("  FTC Robotics programmer — 13th/Atlanta-Marist League"); write("  Building: cybersecurity tools, SIEM dashboards, Arduino security systems"); }
  else if (lo==="skills")                       { write("  Python · JavaScript · HTML/CSS · Linux · Networking · Arduino C++ · Git"); }
  else if (lo==="projects")                     { write("  1. Password Strength Analyzer (Python + HIBP)"); write("  2. Network Port Scanner (TCP fingerprinting)"); write("  3. Arduino CyberDoor v1 (physical access control)"); write("  4. DanielOS SIEM Dashboard (Chart.js + GitHub API)"); write("  5. DanielOS Cyber Terminal (this terminal!)"); write("  → See projects.html for full details"); }
  else if (lo==="contact")                      { write("  Email: Daniel.Michael20208@gmail.com"); write("  GitHub: github.com/danielmichael20208"); write("  Portfolio: danielmichael20208.github.io/portfolio/"); }
  else if (lo==="status")                       { showStatus(); }
  else if (lo==="door")                         { showDoorInfo(); }
  else if (lo==="door logs"||lo==="python cyberdoor_logs.py") { showDoorLogs(); }
  else if (lo==="python password_analyzer.py"||lo==="run password"||lo==="password analyzer") { runPasswordAnalyzer(); }
  else if (lo==="python port_scanner.py"||lo==="run scanner"||lo==="port scanner") { runPortScanner(); }
  else if (lo==="logs")                         { await showGlobalLogs(); }
  else if (lo==="logs --follow")                { await tailLogs(); }
  else if (lo==="logs export csv")              { await exportCSV(); }
  else if (lo==="logs export jsonl")            { await exportJSONL(); }
  else if (lo==="alerts")                       { await runAlerts(); }
  else if (lo.startsWith("logs since="))        { await filterLogsSince(lo.split("=")[1]); }
  else if (lo.startsWith("logs source="))       { await filterByField("source", lo.split("=")[1]); }
  else if (lo.startsWith("logs level="))        { await filterByField("level", lo.split("=")[1]); }
  else if (lo.startsWith("logs contains="))     { await filterContains(lo.split("=")[1]); }
  else if (lo.startsWith("logs "))              { await compositeQuery(lo); }
  else if (lo==="ls")                           { const f=fileSystem[cwd]||{}; Object.keys(f).forEach(k=>write("  "+k, "#4ade80")); }
  else if (lo==="pwd")                          { write("  "+cwd); }
  else if (lo.startsWith("run "))               { const name=cmd.split(" ").slice(1).join(" "); if ((fileSystem[cwd]||{})[name]) write("  [Simulated] Running "+name+" ...", "#8a919e"); else write("  File not found: "+name, "#ef4444"); }
  else if (lo==="clear")                        { termOutput.innerHTML=""; }
  else                                          { write("  Command not found: "+cmd, "#ef4444"); write("  Type 'help' to see available commands.", "#8a919e"); }

  blank();
}

function runCmd(c) { handleCommand(c); termInput.value=""; termInput.focus(); }

termInput.addEventListener("keydown", e => {
  if (e.key === "Enter") { runCmd(termInput.value); termInput.value = ""; }
});
</script>

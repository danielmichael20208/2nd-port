<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal | Daniel Michael</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .terminal-page { min-height:100vh; display:flex; flex-direction:column; padding-top:4.5rem; }
    .t-header { padding:2rem 4rem 1.5rem; border-bottom:1px solid rgba(201,168,76,.08); }
    .t-header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
    .t-page-title { font-family:var(--font-display); font-size:1.4rem; font-weight:600; letter-spacing:.06em; color:var(--white); }
    .t-page-title span { color:var(--gold); }
    .t-hint { font-family:var(--font-mono); font-size:.67rem; color:var(--muted); letter-spacing:.1em; }
    .t-hint span { color:var(--gold-dim); }
    .t-wrap { flex:1; max-width:1100px; margin:0 auto; width:100%; padding:2rem 4rem 4rem; }
    .t-window { background:#050608; border:1px solid rgba(201,168,76,.2); height:calc(100vh - 260px); min-height:480px; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(201,168,76,.04); }
    .t-titlebar { background:var(--obsidian-3); padding:.7rem 1.2rem; display:flex; align-items:center; gap:.5rem; border-bottom:1px solid rgba(201,168,76,.1); flex-shrink:0; }
    .dot { width:10px; height:10px; border-radius:50%; }
    .dr { background:#ff5f56; } .dy { background:#ffbd2e; } .dg { background:#27c93f; }
    .t-bar-title { margin:0 auto; font-family:var(--font-mono); font-size:.63rem; letter-spacing:.15em; color:var(--muted); }
    .t-bar-status { font-family:var(--font-mono); font-size:.58rem; color:var(--green); letter-spacing:.1em; }
    #t-out { flex:1; overflow-y:auto; padding:1.4rem 2rem; font-family:var(--font-mono); font-size:.8rem; line-height:1.9; scroll-behavior:smooth; }
    #t-out::-webkit-scrollbar { width:3px; }
    #t-out::-webkit-scrollbar-thumb { background:var(--gold-dim); }
    .tl { display:block; white-space:pre-wrap; word-break:break-word; }
    .tp { color:var(--gold); } .ts { color:var(--green); } .te { color:#dc6060; } .ti { color:var(--muted); } .tg { color:var(--gold); } .td { color:#4a4840; }
    .t-input-row { display:flex; align-items:center; padding:.7rem 2rem; border-top:1px solid rgba(201,168,76,.08); background:#050608; flex-shrink:0; }
    .t-in-prompt { font-family:var(--font-mono); font-size:.8rem; color:var(--gold); white-space:nowrap; margin-right:.5rem; }
    #cmd { flex:1; background:transparent; border:none; outline:none; font-family:var(--font-mono); font-size:.8rem; color:var(--white); caret-color:var(--gold); }
    .quickcmds { padding:.7rem 4rem; max-width:1100px; margin:0 auto; width:100%; display:flex; gap:.5rem; flex-wrap:wrap; }
    .qcmd { font-family:var(--font-mono); font-size:.63rem; letter-spacing:.1em; padding:.28rem .75rem; border:1px solid rgba(201,168,76,.2); color:var(--gold-dim); background:transparent; cursor:pointer; transition:all .2s; }
    .qcmd:hover { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.05); }
    @media (max-width:768px) { .t-header,.t-wrap,.quickcmds { padding-left:1.5rem; padding-right:1.5rem; } #t-out,.t-input-row { padding-left:1rem; padding-right:1rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">DM</a>
    <ul class="nav-links">
      <li><a href="projects.html">Projects</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="labs.html">Cyber Labs</a></li>
      <li><a href="terminal.html" class="active">Terminal</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="terminal-page">
    <div class="t-header">
      <div class="t-header-inner">
        <h1 class="t-page-title">Interactive <span>Terminal</span></h1>
        <p class="t-hint">Type <span>help</span> to get started</p>
      </div>
    </div>
    <div class="t-wrap">
      <div class="t-window">
        <div class="t-titlebar">
          <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
          <span class="t-bar-title">daniel@portfolio ~ bash</span>
          <span class="t-bar-status">● connected</span>
        </div>
        <div id="t-out"></div>
        <div class="t-input-row">
          <span class="t-in-prompt">daniel@portfolio:~$&nbsp;</span>
          <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
        </div>
      </div>
    </div>
    <div class="quickcmds">
      <button class="qcmd" onclick="run('about')">about</button>
      <button class="qcmd" onclick="run('skills')">skills</button>
      <button class="qcmd" onclick="run('projects')">projects</button>
      <button class="qcmd" onclick="run('labs')">labs</button>
      <button class="qcmd" onclick="run('certs')">certs</button>
      <button class="qcmd" onclick="run('contact')">contact</button>
      <button class="qcmd" onclick="run('status')">status</button>
      <button class="qcmd" onclick="run('clear')">clear</button>
    </div>
  </div>

  <script>
    const out=document.getElementById('t-out');
    const inp=document.getElementById('cmd');
    const hist=[];let hi=-1;

    const boot=[
      {c:'td',t:'──────────────────────────────────────────────────'},
      {c:'tg',t:'   DANIEL MICHAEL // PORTFOLIO TERMINAL v2.0'},
      {c:'td',t:'──────────────────────────────────────────────────'},
      {c:'ti',t:'   Cristo Rey Atlanta Jesuit · Class of 2028'},
      {c:'td',t:''},
      {c:'ts',t:'   [OK] Session started'},
      {c:'ts',t:'   [OK] Projects: 3 active'},
      {c:'ts',t:'   [OK] Labs: 8 tracked'},
      {c:'td',t:''},
      {c:'ti',t:"   Type 'help' to see available commands."},
      {c:'td',t:'──────────────────────────────────────────────────'},
      {c:'',  t:''},
    ];

    const CMDS={
      help:()=>[
        {c:'tg',t:'Commands:'},
        {c:'td',t:''},
        {c:'tg',t:'  about      →  About me'},
        {c:'tg',t:'  skills     →  Technical skills'},
        {c:'tg',t:'  projects   →  My projects'},
        {c:'tg',t:'  labs       →  Cyber labs & training'},
        {c:'tg',t:'  certs      →  Certification pipeline'},
        {c:'tg',t:'  contact    →  Contact info'},
        {c:'tg',t:'  status     →  Project status'},
        {c:'tg',t:'  ls         →  List site sections'},
        {c:'tg',t:'  clear      →  Clear terminal'},
        {c:'td',t:''},
      ],
      about:()=>[
        {c:'tg',t:'About:'},
        {c:'td',t:''},
        {c:'',t:'  Name     :  Daniel Michael'},
        {c:'',t:'  School   :  Cristo Rey Atlanta Jesuit High School'},
        {c:'',t:'  Year     :  Sophomore · Class of 2028'},
        {c:'',t:'  Location :  Atlanta, Georgia'},
        {c:'',t:'  Work     :  Georgia Tech · Dean of Engineering Office'},
        {c:'',t:'  Robotics :  FTC Programmer · 13th Place, Marist League'},
        {c:'',t:'  Plans    :  Pursuing CS & Cybersecurity in college'},
        {c:'td',t:''},
      ],
      skills:()=>[
        {c:'tg',t:'Skills:'},
        {c:'td',t:''},
        {c:'',t:'  Languages   │  Python · Java · Bash'},
        {c:'',t:'  OS          │  Linux · Windows'},
        {c:'',t:'  Networking  │  TCP/IP · DNS · HTTP · Wireshark'},
        {c:'',t:'  Security    │  CTFs · Port Scanning · SIEM · Log Analysis'},
        {c:'',t:'  Hardware    │  Arduino · Embedded · Physical Security'},
        {c:'',t:'  Tools       │  Git · GitHub Pages · VS Code'},
        {c:'td',t:''},
      ],
      projects:()=>[
        {c:'tg',t:'Projects:'},
        {c:'td',t:''},
        {c:'ts',t:'  [LIVE]    password-strength-analyzer'},
        {c:'ti',t:'             Python · entropy calc · SIEM logging'},
        {c:'td',t:''},
        {c:'tg',t:'  [WIP]     python-port-scanner'},
        {c:'ti',t:'             TCP probing · service ID · SIEM integration'},
        {c:'td',t:''},
        {c:'',t:'  [PROTO]   arduino-cyberdoor-v1'},
        {c:'ti',t:'             Physical access control · PIN auth · servo lock'},
        {c:'td',t:''},
      ],
      labs:()=>[
        {c:'tg',t:'Labs:'},
        {c:'td',t:''},
        {c:'ts',t:'  [DONE]    Wireshark Traffic Analysis'},
        {c:'tg',t:'  [ACTIVE]  TryHackMe – Pre-Security & Intro to Cyber'},
        {c:'tg',t:'  [ACTIVE]  PicoCTF'},
        {c:'tg',t:'  [ACTIVE]  OverTheWire – Bandit'},
        {c:'tg',t:'  [ACTIVE]  Python Security Automation'},
        {c:'tg',t:'  [ACTIVE]  CyberDoor Hardware Lab'},
        {c:'tg',t:'  [WIP]     HackTheBox Academy'},
        {c:'ts',t:'  [LIVE]    Security SIEM Dashboard'},
        {c:'td',t:''},
      ],
      certs:()=>[
        {c:'tg',t:'Certification Pipeline:'},
        {c:'td',t:''},
        {c:'tg',t:'  Stage 1 — Foundation  [In Progress]'},
        {c:'ti',t:'    CompTIA Network+'},
        {c:'ti',t:'    Linux Essentials'},
        {c:'ti',t:'    Google Cybersecurity Certificate'},
        {c:'td',t:''},
        {c:'ti',t:'  Stage 2 — Security Core  [Planned]'},
        {c:'ti',t:'    CompTIA Security+ · eJPT · AZ-900 · Splunk'},
        {c:'td',t:''},
        {c:'ti',t:'  Stage 3 — Specialization  [Future]'},
        {c:'ti',t:'    OSCP · eWPT · GSEC (SANS)'},
        {c:'td',t:''},
      ],
      contact:()=>[
        {c:'tg',t:'Contact:'},
        {c:'td',t:''},
        {c:'',t:'  Email   :  Daniel.Michael20208@gmail.com'},
        {c:'',t:'  GitHub  :  github.com/danielmichael20208'},
        {c:'ti',t:'  Response: 24–48 hours'},
        {c:'td',t:''},
      ],
      status:()=>[
        {c:'tg',t:'Project Status:'},
        {c:'td',t:''},
        {c:'ts',t:'  [LIVE]    password-strength-analyzer'},
        {c:'tg',t:'  [WIP]     python-port-scanner'},
        {c:'',t:'  [PROTO]   arduino-cyberdoor-v1'},
        {c:'td',t:''},
      ],
      ls:()=>[
        {c:'tg',t:'Site Sections:'},
        {c:'td',t:''},
        {c:'',t:'  index.html      Home'},
        {c:'',t:'  projects.html   Projects'},
        {c:'',t:'  resume.html     Resume'},
        {c:'',t:'  labs.html       Cyber Labs'},
        {c:'',t:'  terminal.html   This terminal'},
        {c:'',t:'  contact.html    Contact'},
        {c:'td',t:''},
      ],
      clear:()=>{ out.innerHTML=''; return []; },
    };

    function print(line){const s=document.createElement('span');s.className='tl '+(line.c||'');s.textContent=line.t;out.appendChild(s);}
    function printAll(lines){if(lines&&lines.length)lines.forEach(l=>print(l));out.scrollTop=out.scrollHeight;}
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    function run(cmd){
      cmd=cmd.trim().toLowerCase();if(!cmd)return;
      const echo=document.createElement('span');echo.className='tl';
      echo.innerHTML=`<span class="tp">daniel@portfolio:~$ </span>${esc(cmd)}`;
      out.appendChild(echo);
      if(cmd in CMDS){const r=CMDS[cmd]();if(r&&r.length)printAll(r);}
      else{printAll([{c:'te',t:`bash: ${cmd}: command not found`},{c:'ti',t:"Type 'help' for commands."},{c:'td',t:''}]);}
      out.scrollTop=out.scrollHeight;
    }

    let i=0;function bootNext(){if(i<boot.length){print(boot[i++]);out.scrollTop=out.scrollHeight;setTimeout(bootNext,50);}}
    bootNext();

    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){const v=inp.value;hist.unshift(v);hi=-1;inp.value='';run(v);}
      else if(e.key==='ArrowUp'){e.preventDefault();if(hi<hist.length-1){hi++;inp.value=hist[hi];}}
      else if(e.key==='ArrowDown'){e.preventDefault();if(hi>0){hi--;inp.value=hist[hi];}else{hi=-1;inp.value='';}}
    });
    document.querySelector('.t-window').addEventListener('click',()=>inp.focus());
  </script>
</body>
</html>
